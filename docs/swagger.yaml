      email:
        type: string
      id:
        type: integer
      name:
        type: string
      passwordHash:
        type: string
    type: object
  models.WorkoutSession:
    properties:
      datetime:
        type: string
      id:
        type: integer
      order_index:
        type: integer
      sets:
        items:
          $ref: '#/definitions/models.WorkoutSet'
        type: array
      training:
        allOf:
        - $ref: '#/definitions/models.Training'
        description: Associations
      training_id:
        type: integer
      user_id:
        type: integer
      workout_type:
