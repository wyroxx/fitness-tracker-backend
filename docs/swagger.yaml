    type: object
  models.WorkoutSet:
    properties:
      distance_meters:
        type: number
      duration_seconds:
        type: integer
      id:
        type: integer
      notes:
        type: string
      reps:
        type: integer
      set_number:
        type: integer
      weight_kg:
        type: number
      workout_session_id:
        type: integer
    type: object
  models.WorkoutType:
    properties:
      default_metric:
        type: string
      description:
        type: string
      id:
        type: integer
      image_url:
        type: string
      muscle_group:
        allOf:
        - $ref: '#/definitions/models.MuscleGroup'
        description: Associations
      muscle_group_id:
        type: integer
      name:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for the Fitness Tracker backend service.
  title: Fitness Tracker API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user credentials and returns JWT pair
      parameters:
      - description: Credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fitness-tracker-backend_user_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/fitness-tracker-backend_user_handler.errorResponse'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      responses:
        "204":
          description: No Content
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Logout (client-side token discard)
      tags:
      - auth
  /auth/refresh:
    post:
