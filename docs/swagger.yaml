    properties:
      error:
        type: string
    type: object
  fitness-tracker-backend_workout_handler.errorResponse:
    properties:
      error:
        type: string
    type: object
  handler.createUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    required:
    - email
    - name
    - password
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.muscleGroupRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  handler.profileStatsResponse:
    properties:
      ai_insight:
        type: string
      last_training_at:
        type: string
      total_exercise_sessions:
        type: integer
      total_workouts:
        type: integer
      trainings_this_week:
        type: integer
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.replaceWorkoutSetsRequest:
    properties:
      sets:
        items:
          $ref: '#/definitions/handler.workoutSetRequest'
        type: array
    type: object
  handler.suggestionResponse:
    properties:
      suggestion:
        type: string
    type: object
  handler.tokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  handler.trainingListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.Training'
        type: array
      next_cursor:
        type: string
    type: object
  handler.trainingRequest:
    properties:
      finished_at:
        type: string
      notes:
        type: string
      sessions:
        items:
          $ref: '#/definitions/handler.trainingSessionRequest'
        type: array
      started_at:
        type: string
      title:
        type: string
    type: object
  handler.trainingSessionRequest:
    properties:
      datetime:
        type: string
      order_index:
        type: integer
      sets:
        items:
          $ref: '#/definitions/handler.workoutSetRequest'
        type: array
      workout_type_id:
        type: integer
    required:
    - workout_type_id
    type: object
  handler.trainingUpdateRequest:
    properties:
      finished_at:
        type: string
      notes:
        type: string
      started_at:
        type: string
      title:
        type: string
    type: object
  handler.updateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handler.workoutSessionRequest:
    properties:
      datetime:
        type: string
      order_index:
        type: integer
      sets:
        items:
          $ref: '#/definitions/handler.workoutSetRequest'
        type: array
      training_id:
        type: integer
      workout_type_id:
        type: integer
    required:
    - training_id
    - workout_type_id
    type: object
  handler.workoutSetRequest:
    properties:
      distance_meters:
        type: number
      duration_seconds:
        type: integer
      notes:
        type: string
      reps:
        type: integer
      set_number:
        type: integer
      weight_kg:
        type: number
    type: object
  handler.workoutTypeRequest:
    properties:
      default_metric:
        type: string
      description:
        type: string
      image_url:
        type: string
      muscle_group_id:
        type: integer
      name:
        type: string
    required:
    - muscle_group_id
    - name
    type: object
  models.MuscleGroup:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.Training:
    properties:
      created_at:
        type: string
      finished_at:
        type: string
      id:
        type: integer
      notes:
        type: string
      sessions:
        items:
          $ref: '#/definitions/models.WorkoutSession'
        type: array
      started_at:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.User:
    properties:
      createdAt:
